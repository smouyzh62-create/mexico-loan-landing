<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>落地页后台配置</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#F9FAFB] text-slate-900 antialiased">
  <main class="min-h-screen flex items-center justify-center px-4 py-8">
    <section class="w-full max-w-[560px]">
      <div class="mb-6">
        <p class="text-sm font-semibold text-emerald-700">Landing Page Admin</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-950">后台配置</h1>
        <p class="mt-3 text-sm leading-6 text-slate-600">
          在这里修改 Facebook Pixel ID 和 WhatsApp 跳转号码。保存后刷新前台页面即可生效。
        </p>
      </div>

      <form id="configForm" class="rounded-3xl border border-slate-100 bg-white p-6 shadow-xl shadow-slate-200/70" novalidate>
        <div>
          <label for="whatsappNumber" class="block text-sm font-semibold text-slate-800">
            WhatsApp 号码
          </label>
          <input
            id="whatsappNumber"
            name="whatsappNumber"
            type="tel"
            inputmode="numeric"
            placeholder="例如：5215500000000"
            class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-medium text-slate-900 outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100"
          />
          <p class="mt-2 text-xs leading-5 text-slate-500">
            请填写国家区号 + 手机号。可输入 <span class="font-semibold">+</span>、空格或横线，系统会自动清理成 WhatsApp 跳转所需的纯数字。
          </p>
        </div>

        <div class="mt-6">
          <label for="adminPassword" class="block text-sm font-semibold text-slate-800">
            后台保存密码
          </label>
          <input
            id="adminPassword"
            name="adminPassword"
            type="password"
            autocomplete="current-password"
            placeholder="请输入后台保存密码"
            class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-medium text-slate-900 outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100"
          />
          <p class="mt-2 text-xs leading-5 text-slate-500">
            默认本地密码是 <span class="font-semibold">admin123456</span>。正式上线请用环境变量 <span class="font-semibold">ADMIN_PASSWORD</span> 修改。
          </p>
        </div>

        <div class="mt-6">
          <label for="whatsappMessage" class="block text-sm font-semibold text-slate-800">
            WhatsApp 自动打招呼文案
          </label>
          <textarea
            id="whatsappMessage"
            name="whatsappMessage"
            rows="5"
            maxlength="500"
            placeholder="Hola, me interesa solicitar un préstamo regular sin anticipos. Mi número es {phone}."
            class="mt-2 w-full resize-none rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-medium leading-6 text-slate-900 outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100"
          ></textarea>
          <p class="mt-2 text-xs leading-5 text-slate-500">
            可用 <span class="font-semibold">{phone}</span> 自动插入用户填写的手机号。最多 500 个字符。
          </p>
        </div>

        <div class="mt-6">
          <label for="facebookPixelId" class="block text-sm font-semibold text-slate-800">
            Facebook Pixel ID
          </label>
          <input
            id="facebookPixelId"
            name="facebookPixelId"
            type="text"
            inputmode="numeric"
            placeholder="例如：123456789012345"
            class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-4 text-base font-medium text-slate-900 outline-none transition focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100"
          />
          <p class="mt-2 text-xs leading-5 text-slate-500">
            留空则不加载 Pixel。前台会自动触发 <span class="font-semibold">PageView</span> 和 WhatsApp 点击前的 <span class="font-semibold">Lead</span> 事件。
          </p>
        </div>

        <p id="statusMessage" class="mt-5 hidden rounded-2xl px-4 py-3 text-sm font-medium"></p>

        <button
          id="saveButton"
          type="submit"
          class="mt-6 flex w-full items-center justify-center rounded-2xl bg-emerald-600 px-5 py-4 text-base font-bold text-white shadow-lg shadow-emerald-600/20 transition hover:bg-emerald-700 active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-80"
        >
          保存配置
        </button>

        <a
          href="/"
          class="mt-4 flex w-full items-center justify-center rounded-2xl border border-slate-200 bg-white px-5 py-4 text-base font-bold text-slate-700 transition hover:bg-slate-50"
        >
          查看前台页面
        </a>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("configForm");
    const whatsappNumberInput = document.getElementById("whatsappNumber");
    const adminPasswordInput = document.getElementById("adminPassword");
    const whatsappMessageInput = document.getElementById("whatsappMessage");
    const facebookPixelIdInput = document.getElementById("facebookPixelId");
    const statusMessage = document.getElementById("statusMessage");
    const saveButton = document.getElementById("saveButton");

    loadConfig();

    whatsappNumberInput.addEventListener("input", function () {
      this.value = this.value.replace(/[^\d+\s()-]/g, "").slice(0, 30);
    });

    facebookPixelIdInput.addEventListener("input", function () {
      this.value = this.value.replace(/\D/g, "").slice(0, 30);
    });

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const whatsappNumber = whatsappNumberInput.value.replace(/\D/g, "");
      const adminPassword = adminPasswordInput.value;
      const whatsappMessage = whatsappMessageInput.value.trim();
      const facebookPixelId = facebookPixelIdInput.value.trim();

      if (!/^\d{6,20}$/.test(whatsappNumber)) {
        showStatus("WhatsApp 号码需要包含国家区号，清理后至少 6 位数字。", "error");
        whatsappNumberInput.focus();
        return;
      }

      if (facebookPixelId && !/^\d{5,30}$/.test(facebookPixelId)) {
        showStatus("Facebook Pixel ID 只能填写数字，或留空。", "error");
        facebookPixelIdInput.focus();
        return;
      }

      if (!whatsappMessage) {
        showStatus("WhatsApp 自动打招呼文案不能为空。", "error");
        whatsappMessageInput.focus();
        return;
      }

      if (!adminPassword) {
        showStatus("请输入后台保存密码。", "error");
        adminPasswordInput.focus();
        return;
      }

      saveButton.disabled = true;
      saveButton.textContent = "保存中...";

      try {
        const response = await fetch("/api/config", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            whatsappNumber,
            adminPassword,
            whatsappMessage,
            facebookPixelId
          })
        });

        if (!response.ok) {
          throw new Error("保存失败");
        }

        const savedConfig = await response.json();
        whatsappNumberInput.value = savedConfig.whatsappNumber;
        whatsappMessageInput.value = savedConfig.whatsappMessage;
        facebookPixelIdInput.value = savedConfig.facebookPixelId;
        adminPasswordInput.value = "";
        showStatus("配置已保存。刷新前台页面即可看到新配置。", "success");
      } catch (error) {
        showStatus("保存失败，请检查密码是否正确，或确认本地服务是否正常运行。", "error");
      } finally {
        saveButton.disabled = false;
        saveButton.textContent = "保存配置";
      }
    });

    async function loadConfig() {
      try {
        const response = await fetch("/api/config", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("读取失败");
        }

        const config = await response.json();
        whatsappNumberInput.value = config.whatsappNumber || "";
        whatsappMessageInput.value = config.whatsappMessage || "";
        facebookPixelIdInput.value = config.facebookPixelId || "";
      } catch (error) {
        showStatus("读取配置失败，请确认后端服务已启动。", "error");
      }
    }

    function showStatus(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = "mt-5 rounded-2xl px-4 py-3 text-sm font-medium";
      statusMessage.classList.add(
        type === "success" ? "bg-emerald-50" : "bg-red-50",
        type === "success" ? "text-emerald-700" : "text-red-700"
      );
    }
  </script>
</body>
</html>
